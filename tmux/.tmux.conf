set -g default-shell "${SHELL}"
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,alacritty:RGB,kitty:RGB"

unbind r
bind r source-file ~/.tmux.conf
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g extended-keys on
if-shell 'tmux -V | awk '\''{ split($2, v, /[^0-9]+/); exit !((v[1] > 3) || (v[1] == 3 && v[2] >= 5)) }'\''' \
  'set -g extended-keys-format csi-u'
set -g prefix C-s
unbind C-b


set -g mouse on
setw -g mode-keys vi
set -g focus-events on

# Pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# Vim-tmux-navigator key bindings


# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Handle the C-l clear screen conflict
# bind -n 'C-\' select-pane -l

# Split panes in same directory
# Pane splits should open to the same path as the current pane

# Open cheat script
bind-key -r i if-shell 'command -v tmux-cht >/dev/null 2>&1' \
  'display-popup -E -w 80% -h 80% "tmux-cht"' \
  'display-message "Missing tmux-cht; run stow --restow tmux"'
# bind-key -r d run-shell "~/.config/tmux/plugins/tpm/scripts/tmux-dev-layout.sh"

set -g set-clipboard on
set -g allow-passthrough on
set -g visual-activity off
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.0.0'
# set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin 'Nucc/tmux-which-key'
set -g @which-key-popup-bg '#24273a'
set -g @which-key-popup-fg '#8aadf4'

# Theme: Catppuccin Macchiato
set -g status-position top
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_background "default"
set -g @catppuccin_date_time_text "%H:%M"
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_red}"

# Status line
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
# set -ag status-left "#{pomodoro_status}"

