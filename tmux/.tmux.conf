# Load TPM
if-shell 'test -x "$HOME/.tmux/plugins/tpm/tpm"' \
  'run-shell "$HOME/.tmux/plugins/tpm/tpm"' \
  'display-message "TPM missing: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
