set -g default-command "${SHELL}"

unbind r
bind r source-file ~/.tmux.conf
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g extended-keys on
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -d ".")" -ge "35" ]' \
  'set -g extended-keys-format csi-u'
set -g prefix C-s
unbind C-b


set -g mouse on
setw -g mode-keys vi
set -g focus-events on

# Pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# Vim-tmux-navigator key bindings


# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Handle the C-l clear screen conflict
# bind -n 'C-\' select-pane -l

# Split panes in same directory
# Pane splits should open to the same path as the current pane

# Open cheat script
bind-key -r i run-shell "tmux neww ~/.local/scripts/tmux-cht.sh"
# bind-key -r d run-shell "~/.config/tmux/plugins/tpm/scripts/tmux-dev-layout.sh"

set -g set-clipboard on
set -g allow-passthrough on
set -g visual-activity off

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.0.0'
# set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin 'Nucc/tmux-which-key'

# Theme: Catppuccin Macchiato
set -g status-position top
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

