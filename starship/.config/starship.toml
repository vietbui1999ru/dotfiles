"$schema" = 'https://starship.rs/config-schema.json'

palette = "kitty_sync"

format = """
[в•ӯв”Җ](fg:surface2)\
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](bg:green fg:peach)\
$git_branch\
$git_status\
$git_state\
[](bg:teal fg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$python\
$conda\
[](fg:teal)\
$fill\
$shlvl\
$sudo\
$kubernetes\
$docker_context\
$direnv\
${custom.db}\
${custom.aws}\
$package\
$git_commit\
$cmd_duration\
$status\
$jobs\
$git_metrics\
$time\
[в”Җв•®](fg:surface2)\
$line_break\
[в•°в”Җ](fg:surface2)$character"""

add_newline = true
command_timeout = 1000

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "у°Җө "
Linux = " "

[username]
show_always = false
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ у°Җ„ $user ]($style)'
disabled = false

[directory]
style = "bg:peach fg:base"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у°Ҳҷ Documents"
"Downloads" = " Downloads"
"Music" = "у°қҡ Music"
"Pictures" = " Pictures"
"repos" = "у°ІӢ repos"
"dotfiles" = " dotfiles"

# в”Җв”Җ Git (green segment) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "оңҘ "
style = "bg:green fg:base"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:green fg:base"
format = '[$all_status$ahead_behind ]($style)'
# $all_status: $conflicted $stashed $deleted $renamed $modified $staged $untracked
# $ahead_behind: $ahead $behind $diverged $up_to_date
ahead      = "вҶ‘${count}"          # ahead of remote
behind     = "вҶ“${count}"          # behind remote
diverged   = "вҮ…вҶ‘${ahead_count}вҶ“${behind_count}"  # both ahead and behind
stashed    = "вҡ‘${count}"          # stashed entries (flag = saved aside)
modified   = "~${count}"          # unstaged edits (tilde = approximate/changed)
staged     = "в–І${count}"          # in index (up-triangle = lifted to stage)
untracked  = "вҖҰ${count}"          # new files not yet tracked
deleted    = "вң–${count}"          # removed files
conflicted = "вү ${count}"          # merge conflicts (not-equal = disagreement)

# shows REBASING 3/7, MERGING, CHERRY-PICKING, BISECTING, REVERTING вҖ” only during active operation
[git_state]
style = "bg:green fg:base bold"
format = '[  оңҘ $state( $progress_current/$progress_total) ]($style)'

# в”Җв”Җ Language / runtime (teal segment) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
symbol = "оңҳ "
style = "bg:teal fg:base"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "у°ҹ“ "
style = "bg:teal fg:base"
format = '[ $symbol($version) ]($style)'

[python]
symbol = "оңј "
style = "bg:teal fg:base"
format = '[ $symbol ($version) (оңј $virtualenv) ]($style)'  # $virtualenv shows active venv name

[conda]
symbol = "уұ”Һ "
style = "bg:teal fg:base"
format = '[ $symbol$environment ]($style)'
ignore_base = true   # hide when env is "base"

[rust]
symbol = "оһЁ "
style = "bg:teal fg:base"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "оңӨ "
style = "bg:teal fg:base"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = "у°ҷұ "
style = "bg:teal fg:base"
format = '[ $symbol ($version) ]($style)'

[character]
success_symbol = '[вқҜ](bold green)'
error_symbol = '[вқҜ](bold red)'

# в”Җв”Җ Right-side cluster в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[fill]
symbol = "в”Җ"
style = "fg:surface1"

# shell nesting depth вҖ” only shows at threshold 2+ (inside nix-shell, poetry shell, etc.)
[shlvl]
disabled = false
symbol = "у°Ң’ "
style = "fg:overlay1"
format = '[$symbol$shlvl ]($style)'
threshold = 2

# red icon when sudo credentials are cached (sudo -v)
[sudo]
disabled = false
symbol = "у°Ўҙ "
style = "fg:red"
format = '[$symbol ]($style)'

# kubectl context + namespace вҖ” only when kubeconfig is active
[kubernetes]
disabled = false
symbol = "уұғҫ "
style = "fg:blue"
format = '[$symbol$context( \($namespace\)) ]($style)'

# active Docker context вҖ” only shows when Dockerfile/compose.yml present
[docker_context]
symbol = "оһ° "
style = "fg:sky"
format = '[$symbol$context ]($style)'
only_with_files = true

# .envrc status вҖ” only shows inside a direnv-managed directory
[direnv]
disabled = false
symbol = "у°”Қ "
style = "fg:yellow"
format = '[$symbol$loaded/$allowed ]($style)'

# DB: shows protocol (postgres/mysql/sqlite) only when DATABASE_URL is set
# AND the repo has db artifacts (migrations dir, compose, prisma, etc.)
[custom.db]
command = 'printf "%s" "${DATABASE_URL%%:*}"'
when = '[ -n "${DATABASE_URL:-}" ] && { [ -f docker-compose.yml ] || [ -f docker-compose.yaml ] || [ -d migrations ] || [ -d db ] || [ -f prisma/schema.prisma ] || [ -f database.yml ] || [ -f alembic.ini ]; }'
symbol = "у°Ҷј "
style = "fg:mauve"
format = '[$symbol$output ]($style)'

# AWS: shows active profile only when AWS_PROFILE is set
# AND the repo has IaC/deploy artifacts (.terraform, *.tf, serverless.yml, cdk.json, etc.)
[custom.aws]
command = 'printf "%s" "${AWS_PROFILE:-}"'
when = '[ -n "${AWS_PROFILE:-}" ] && { [ -d .terraform ] || [ -f serverless.yml ] || [ -f cdk.json ] || [ -f samconfig.toml ] || find . -maxdepth 1 -name "*.tf" | grep -q .; }'
symbol = "у°ёҸ "
style = "fg:yellow"
format = '[$symbol$output ]($style)'

# package version from manifest (package.json, Cargo.toml, pyproject.toml, go.mod вҖҰ)
[package]
symbol = "у°Ҹ— "
style = "fg:peach"
format = '[$symbol$version ]($style)'

# short commit hash + tag at HEAD; always shown (not just on detached HEAD)
[git_commit]
commit_hash_length = 7
only_detached = false
tag_symbol = " у°“» "
style = "fg:overlay2"
format = '[$hash$tag ]($style)'

# last command runtime
[cmd_duration]
min_time = 500
min_time_to_notify = 120000
show_notifications = true
style = "fg:yellow"
format = '[ уұҺ« $duration ]($style)'

# exit code вҖ” shows only on failure
[status]
disabled = false
symbol = "вңҳ "
style = "fg:red"
format = '[ $symbol$status ]($style)'

# backgrounded jobs
[jobs]
symbol = "у°ғ– "
style = "fg:sky"
format = '[$symbol$number ]($style)'

# +added / -removed lines in working tree
[git_metrics]
disabled = false
added_style = "fg:green"
deleted_style = "fg:red"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

# clock
[time]
disabled = false
time_format = "%H:%M"
style = "fg:lavender"
format = '[ у°Ҙ” $time ]($style)'

[palettes.kitty_sync]
rosewater = "#cc83b2"
flamingo  = "#805961"
pink      = "#bc7aa0"
mauve     = "#dc8cc3"
red       = "#705050"
maroon    = "#967b6c"
peach     = "#b69e84"
yellow    = "#f0deae"
green     = "#60b48a"
teal      = "#76c2ae"
sky       = "#8cd0d3"
sapphire  = "#719ea6"
blue      = "#506070"
lavender  = "#96769a"
text      = "#dcdccc"
subtext1  = "#c4c4b7"
subtext0  = "#adada2"
overlay2  = "#b8b8ac"
overlay1  = "#a3a399"
overlay0  = "#8d8d86"
surface2  = "#787873"
surface1  = "#626260"
surface0  = "#4d4d4d"
base      = "#3f3f3f"
mantle    = "#363636"
crust     = "#2c2c2c"
