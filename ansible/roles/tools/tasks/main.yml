---
# ── macOS (Homebrew) ──────────────────────────────────────────────────
- name: Install modern CLI tools (macOS)
  community.general.homebrew:
    name:
      - eza
      - bat
      - ripgrep
      - fd
      - git-delta
      - lazygit
      - fzf
      - zoxide
      - jq
      - btop
      - fastfetch
      - rtk
    state: present
  when: ansible_os_family == "Darwin"

- name: Install opencode (macOS)
  community.general.homebrew:
    name: anomalyco/tap/opencode
    state: present
  when: ansible_os_family == "Darwin"

- name: Install uv (macOS)
  community.general.homebrew:
    name: uv
    state: present
  when: ansible_os_family == "Darwin"

- name: Install gh, direnv, yq (macOS)
  community.general.homebrew:
    name:
      - gh
      - direnv
      - yq
    state: present
  when: ansible_os_family == "Darwin"

# Obsidian CLI is bundled with Obsidian 1.12.7+ and registered from
# Obsidian → Settings → General → Command line interface.
- name: Check Obsidian CLI registration (macOS)
  ansible.builtin.command: zsh -lc 'command -v obsidian'
  register: obsidian_cli_macos
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Darwin"

- name: Show Obsidian CLI registration help (macOS)
  ansible.builtin.debug:
    msg: >-
      Obsidian CLI not found. Install/update Obsidian 1.12.7+, then enable
      Settings → General → Command line interface. This should create
      /usr/local/bin/obsidian; restart the terminal afterwards.
  when:
    - ansible_os_family == "Darwin"
    - obsidian_cli_macos.rc != 0

# ── ketch (AI-agent research CLI: web/code/docs search) ────────────────
# Go-based, cross-platform via `go install` — golang role runs before this
# one in site.yml, and $HOME/go/bin is already on PATH (zsh/.zshrc).
- name: Install ketch
  ansible.builtin.shell: |
    go install github.com/1broseidon/ketch@latest
  args:
    creates: "{{ ansible_env.HOME }}/go/bin/ketch"

# ── Debian/Ubuntu ─────────────────────────────────────────────────────
- name: Install tools available in apt (Debian)
  ansible.builtin.apt:
    name:
      - ripgrep
      - fd-find
      - jq
      - btop
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install fzf from GitHub release (Debian)
  ansible.builtin.shell: |
    api=https://api.github.com/repos/junegunn/fzf/releases/latest
    FZF_VERSION=$(curl -fsSL "$api" \
      | grep '"tag_name"' \
      | sed -E 's/.*"v([^"]+)".*/\1/')
    url="https://github.com/junegunn/fzf/releases/download"
    curl -fsSL "$url/v${FZF_VERSION}/fzf-${FZF_VERSION}-linux_amd64.tar.gz" \
      | tar -xz -C "$HOME/.local/bin"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/fzf"
  when: ansible_os_family == "Debian"

- name: Install ripgrep from GitHub release (Debian)
  ansible.builtin.shell: |
    api=https://api.github.com/repos/BurntSushi/ripgrep/releases/latest
    RG_VERSION=$(curl -fsSL "$api" \
      | grep '"tag_name"' \
      | sed -E 's/.*"([^"]+)".*/\1/')
    url=https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}
    archive=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl
    curl -fsSL "$url/${archive}.tar.gz" \
      | tar -xz --strip-components=1 -C "$HOME/.local/bin" \
        "$archive/rg"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/rg"
  when: ansible_os_family == "Debian"

- name: Ensure ~/.local/bin exists (Linux)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"
  when: ansible_os_family != "Darwin"

- name: Install RTK token optimizer (Linux)
  ansible.builtin.shell: |
    installer=https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh
    curl -fsSL "$installer" | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/rtk"
  when: ansible_os_family != "Darwin"

- name: Check Obsidian CLI registration (Linux)
  ansible.builtin.command: bash -lc 'command -v obsidian'
  register: obsidian_cli_linux
  changed_when: false
  failed_when: false
  when: ansible_os_family != "Darwin"

- name: Show Obsidian CLI registration help (Linux)
  ansible.builtin.debug:
    msg: >-
      Obsidian CLI not found. Install/update Obsidian 1.12.7+, enable
      Settings → General → Command line interface, and ensure ~/.local/bin is
      on PATH. If needed, copy obsidian-cli from the Obsidian install directory
      to ~/.local/bin/obsidian and chmod 755 it.
  when:
    - ansible_os_family != "Darwin"
    - obsidian_cli_linux.rc != 0

- name: Create fd symlink for fdfind (Debian)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: "{{ ansible_env.HOME }}/.local/bin/fd"
    state: link
  when: ansible_os_family == "Debian"

- name: Install Rust-based tools via cargo (Debian)
  ansible.builtin.shell: |
    . "$HOME/.cargo/env"
    cargo install {{ item.crate }} --locked
  loop:
    - crate: eza
      bin: eza
    - crate: bat
      bin: bat
    - crate: git-delta
      bin: delta
    - crate: zoxide
      bin: zoxide
    - crate: jj-cli
      bin: jj
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/{{ item.bin }}"
  when: ansible_os_family == "Debian"

- name: Install lazygit (Debian)
  ansible.builtin.shell: |
    api=https://api.github.com/repos/jesseduffield/lazygit/releases/latest
    LAZYGIT_VERSION=$(curl -s "$api" \
      | grep '"tag_name"' \
      | sed -E 's/.*"v*([^"]+)".*/\1/')
    base=https://github.com/jesseduffield/lazygit/releases/latest/download
    archive=lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz
    curl -Lo /tmp/lazygit.tar.gz "$base/$archive"
    tar xf /tmp/lazygit.tar.gz -C /tmp lazygit
    install /tmp/lazygit /usr/local/bin
  become: true
  args:
    creates: /usr/local/bin/lazygit
  when: ansible_os_family == "Debian"

- name: Install opencode (Debian)
  ansible.builtin.shell: |
    XDG_BIN_DIR="$HOME/.local/bin" curl -fsSL https://opencode.ai/install | bash
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/opencode"
  when: ansible_os_family == "Debian"

# ── RedHat/Fedora ──────────────────────────────────────────────────────
- name: Install tools available in dnf (RedHat)
  ansible.builtin.dnf:
    name:
      - ripgrep
      - fd-find
      - fzf
      - jq
      - btop
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Install Rust-based tools via cargo (RedHat)
  ansible.builtin.shell: |
    . "$HOME/.cargo/env"
    cargo install {{ item.crate }} --locked
  loop:
    - crate: eza
      bin: eza
    - crate: bat
      bin: bat
    - crate: git-delta
      bin: delta
    - crate: zoxide
      bin: zoxide
    - crate: jj-cli
      bin: jj
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/{{ item.bin }}"
  when: ansible_os_family == "RedHat"

- name: Install lazygit (RedHat)
  ansible.builtin.shell: |
    api=https://api.github.com/repos/jesseduffield/lazygit/releases/latest
    LAZYGIT_VERSION=$(curl -s "$api" \
      | grep '"tag_name"' \
      | sed -E 's/.*"v*([^"]+)".*/\1/')
    base=https://github.com/jesseduffield/lazygit/releases/latest/download
    archive=lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz
    curl -Lo /tmp/lazygit.tar.gz "$base/$archive"
    tar xf /tmp/lazygit.tar.gz -C /tmp lazygit
    install /tmp/lazygit /usr/local/bin
  become: true
  args:
    creates: /usr/local/bin/lazygit
  when: ansible_os_family == "RedHat"

# ── uv (Python package manager — all Linux) ───────────────────────────
- name: Install uv (Linux)
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"
  environment:
    UV_INSTALL_DIR: "{{ ansible_env.HOME }}/.local/bin"
  when: ansible_os_family != "Darwin"

# ── GitHub CLI ────────────────────────────────────────────────────────
- name: Add GitHub CLI apt keyring (Debian)
  ansible.builtin.shell: |
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
      | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
  become: true
  when: ansible_os_family == "Debian"

- name: Add GitHub CLI apt repository (Debian)
  ansible.builtin.copy:
    content: >-
      deb [arch={{ ansible_architecture }}
      signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    dest: /etc/apt/sources.list.d/github-cli.list
    mode: "0644"
  become: true
  when: ansible_os_family == "Debian"

- name: Install gh (Debian)
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Add GitHub CLI dnf repository (RedHat)
  ansible.builtin.yum_repository:
    name: gh
    description: GitHub CLI
    baseurl: https://cli.github.com/packages/rpm
    gpgkey: >-
      https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x23F3D4EA75716059
    gpgcheck: true
    enabled: true
  become: true
  when: ansible_os_family == "RedHat"

- name: Install gh (RedHat)
  ansible.builtin.dnf:
    name: gh
    state: present
  become: true
  when: ansible_os_family == "RedHat"

# ── direnv ────────────────────────────────────────────────────────────
- name: Install direnv (Debian)
  ansible.builtin.apt:
    name: direnv
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install direnv (RedHat)
  ansible.builtin.dnf:
    name: direnv
    state: present
  become: true
  when: ansible_os_family == "RedHat"

# ── yq ───────────────────────────────────────────────────────────────
- name: Install yq binary (Linux)
  ansible.builtin.shell: |
    case "$(uname -m)" in
      x86_64|amd64) arch=amd64 ;;
      aarch64|arm64) arch=arm64 ;;
      *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
    esac
    api=https://api.github.com/repos/mikefarah/yq/releases/latest
    VERSION=$(curl -fsSL "$api" \
      | grep '"tag_name"' \
      | sed -E 's/.*"v([^"]+)".*/\1/')
    url=https://github.com/mikefarah/yq/releases/download/v${VERSION}
    curl -fsSL "$url/yq_linux_${arch}" \
      -o "{{ ansible_env.HOME }}/.local/bin/yq"
    chmod +x "{{ ansible_env.HOME }}/.local/bin/yq"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/yq"
  when: ansible_os_family != "Darwin"

# ── sqlite3 ───────────────────────────────────────────────────────────
- name: Install sqlite3 (Debian)
  ansible.builtin.apt:
    name: sqlite3
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install sqlite (RedHat)
  ansible.builtin.dnf:
    name: sqlite
    state: present
  become: true
  when: ansible_os_family == "RedHat"
