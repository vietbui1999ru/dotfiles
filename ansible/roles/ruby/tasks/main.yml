---
# Build deps for compiling Ruby from source (mise builds MRI on install)
# Full GDK set — covers native gems (pg, nokogiri, etc.)
- name: Install Ruby build dependencies (Debian)
  ansible.builtin.apt:
    name:
      - autoconf
      - patch
      - libssl-dev
      - libyaml-dev
      - libreadline-dev
      - zlib1g-dev
      - libgmp-dev
      - libncurses5-dev
      - libffi-dev
      - libgdbm-dev
      - libdb-dev
      - uuid-dev
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install Ruby build dependencies (RedHat)
  ansible.builtin.dnf:
    name:
      - autoconf
      - readline-devel
      - openssl-devel
      - zlib-devel
      - libyaml-devel
      - libffi-devel
      - gdbm-devel
      - libuuid-devel
    state: present
    # libyaml-devel/libgdbm-devel live in the CRB repo on RHEL9-family
    # (Rocky/Alma/CentOS Stream); Fedora doesn't have a "crb" repo at all.
    enablerepo: "{{ 'crb' if ansible_distribution != 'Fedora' else omit }}"
  become: true
  when: ansible_os_family == "RedHat"
