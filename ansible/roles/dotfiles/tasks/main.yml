---
- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: git@github.com:vietbui1999ru/dotfiles.git
    dest: "{{ ansible_env.HOME }}/dotfiles"
    version: main
    depth: 1
    update: false
  when: dotfiles_clone_enabled

- name: Init and update git submodules (llm-wiki)
  ansible.builtin.command:
    cmd: git submodule update --init --recursive
    chdir: "{{ ansible_env.HOME }}/dotfiles"
  changed_when: false
  when: dotfiles_submodule_enabled

- name: Bootstrap expected directories and symlinks
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/dotfiles/scripts/bootstrap-dirs.sh"
  changed_when: false

- name: Stow all packages
  ansible.builtin.shell: |
    cd {{ ansible_env.HOME }}/dotfiles
    stow --target="{{ ansible_env.HOME }}" --restow {{ item }}
  loop:
    - zsh
    - starship
    - tmux
    - kitty
    - nvim
    - git
    - claude
  register: dotfiles_stow_result
  changed_when: dotfiles_stow_result.stdout != ""
