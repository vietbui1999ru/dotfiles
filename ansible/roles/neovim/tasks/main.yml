---
- name: Install neovim (macOS)
  community.general.homebrew:
    name: neovim
    state: latest
  when: ansible_os_family == "Darwin"

- name: Add neovim PPA (Ubuntu only — not plain Debian)
  ansible.builtin.apt_repository:
    repo: ppa:neovim-ppa/unstable
    state: present
  become: true
  when: ansible_distribution == "Ubuntu"

- name: Install neovim (Debian/Ubuntu)
  ansible.builtin.apt:
    name: neovim
    state: latest
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install neovim (RedHat/Fedora)
  ansible.builtin.dnf:
    name: neovim
    state: latest
  become: true
  when: ansible_os_family == "RedHat"

- name: Verify neovim version
  ansible.builtin.shell: |
    nvim --version | head -1
  register: nvim_version
  changed_when: false

- name: Show neovim version
  ansible.builtin.debug:
    msg: "{{ nvim_version.stdout }}"
