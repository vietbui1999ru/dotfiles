---
- name: Install base packages (macOS)
  community.general.homebrew:
    name:
      - git
      - stow
      - curl
      - wget
      - gettext
    state: present
  when: ansible_os_family == "Darwin"

- name: Install base packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - git
      - stow
      - curl
      - wget
      - build-essential
      - unzip
      - locales
      - clang
      - llvm
      - cmake
      - pkg-config
      - gettext-base
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Generate en_US.UTF-8 locale (Debian/Ubuntu)
  ansible.builtin.locale_gen:
    name: en_US.UTF-8
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Enable EPEL repository (RHEL/CentOS/Rocky/Alma — not Fedora)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution != "Fedora"

- name: Install base packages (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - git
      - stow
      - curl
      - wget
      - gcc
      - make
      - unzip
      - glibc-langpack-en
      - clang
      - llvm
      - cmake
      - pkgconf-pkg-config
      - gettext
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Set system locale (Debian/Ubuntu)
  ansible.builtin.command: update-locale LANG=en_US.UTF-8
  become: true
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Set system locale (RedHat/Fedora)
  ansible.builtin.lineinfile:
    path: /etc/locale.conf
    regexp: '^LANG='
    line: 'LANG=en_US.UTF-8'
    create: true
  become: true
  when: ansible_os_family == "RedHat"
