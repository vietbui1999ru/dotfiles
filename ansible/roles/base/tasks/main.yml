---
- name: Install base packages (macOS)
  community.general.homebrew:
    name:
      - git
      - stow
      - curl
      - wget
    state: present
  when: ansible_os_family == "Darwin"

- name: Install base packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - git
      - stow
      - curl
      - wget
      - build-essential
      - unzip
      - locales
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Generate en_US.UTF-8 locale (Debian/Ubuntu)
  ansible.builtin.locale_gen:
    name: en_US.UTF-8
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install base packages (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - git
      - stow
      - curl
      - wget
      - gcc
      - make
      - unzip
      - glibc-langpack-en
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Set system locale (Linux)
  ansible.builtin.lineinfile:
    path: /etc/locale.conf
    regexp: '^LANG='
    line: 'LANG=en_US.UTF-8'
    create: true
  become: true
  when: ansible_os_family in ["Debian", "RedHat"]
