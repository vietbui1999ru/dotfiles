---
- name: Install kitty (macOS)
  community.general.homebrew_cask:
    name: kitty
    state: present
  when: ansible_os_family == "Darwin"

- name: Install kitty (Linux — user install via official script)
  ansible.builtin.shell: |
    curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin
  args:
    creates: "{{ ansible_env.HOME }}/.local/kitty.app/bin/kitty"
  when: ansible_os_family != "Darwin"

- name: Install kitty-terminfo (Debian/Ubuntu — system-wide so tmux/SSH sessions see it)
  ansible.builtin.apt:
    name: kitty-terminfo
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install xterm-kitty terminfo (non-Debian Linux — user-level from kitty install)
  ansible.builtin.shell: |
    tic -x ~/.local/kitty.app/lib/kitty/terminfo/xterm-kitty.terminfo
  args:
    creates: "{{ ansible_env.HOME }}/.terminfo/x/xterm-kitty"
  when:
    - ansible_os_family != "Darwin"
    - ansible_os_family != "Debian"

- name: Symlink OS-specific kitty config (macOS)
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/kitty/kitty-macos.conf"
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty-os.conf"
    state: link
    force: true
  when: ansible_os_family == "Darwin"

- name: Symlink OS-specific kitty config (Linux)
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/kitty/kitty-linux.conf"
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty-os.conf"
    state: link
    force: true
  when: ansible_os_family != "Darwin"
