---
- name: Install kitty (macOS)
  community.general.homebrew_cask:
    name: kitty
    state: present
  when: ansible_os_family == "Darwin"

- name: Install kitty (Linux — user install via official script)
  ansible.builtin.shell: |
    curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin
  args:
    creates: "{{ ansible_env.HOME }}/.local/kitty.app/bin/kitty"
  when: ansible_os_family != "Darwin"

- name: Install kitty-terminfo (Debian/Ubuntu — system-wide so tmux/SSH sessions see it)
  ansible.builtin.apt:
    name: kitty-terminfo
    state: present
  become: true
  when: ansible_os_family == "Debian"

- name: Install xterm-kitty terminfo (non-Debian Linux — user-level from kitty install)
  ansible.builtin.shell: |
    tic -x ~/.local/kitty.app/lib/kitty/terminfo/xterm-kitty.terminfo
  args:
    creates: "{{ ansible_env.HOME }}/.terminfo/x/xterm-kitty"
  when:
    - ansible_os_family != "Darwin"
    - ansible_os_family != "Debian"

# ── Hack Nerd Font Mono ───────────────────────────────────────
- name: Install Hack Nerd Font (macOS)
  community.general.homebrew_cask:
    name: font-hack-nerd-font
    state: present
  when: ansible_os_family == "Darwin"

- name: Create user font directory (Linux)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts/HackNerdFont"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Darwin"

- name: Download Hack Nerd Font zip (Linux)
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hack.zip"
    dest: /tmp/HackNerdFont.zip
  when:
    - ansible_os_family != "Darwin"
    - not ansible_check_mode

- name: Install Hack Nerd Font (Linux)
  ansible.builtin.unarchive:
    src: /tmp/HackNerdFont.zip
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/HackNerdFont/"
    remote_src: true
    creates: "{{ ansible_env.HOME }}/.local/share/fonts/HackNerdFont/HackNerdFontMono-Regular.ttf"
  when: ansible_os_family != "Darwin"
  notify: Refresh font cache

# ── OS-specific kitty config symlink ─────────────────────────
- name: Symlink OS-specific kitty config (macOS)
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/kitty/kitty-macos.conf"
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty-os.conf"
    state: link
    force: true
  when: ansible_os_family == "Darwin"

- name: Symlink OS-specific kitty config (Linux)
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/kitty/kitty-linux.conf"
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty-os.conf"
    state: link
    force: true
  when: ansible_os_family != "Darwin"
