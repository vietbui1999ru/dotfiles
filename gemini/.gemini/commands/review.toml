description = "Code review focused on correctness, security, and maintainability."
prompt = """
Review the code changes for: {{args}}

Changed files: !{git diff --name-only}
Diff: !{git diff}

Review checklist:
1. Correctness — does the logic match the intent?
2. Security — OWASP Top 10; indirect prompt injection if AI-adjacent
3. Performance — obvious bottlenecks or O(n²) patterns
4. Maintainability — naming, coupling, deep vs shallow modules
5. Tests — coverage for the changed behavior?

Flag each issue with: [severity: HIGH/MED/LOW] description. Do NOT implement fixes — flag only.
"""
